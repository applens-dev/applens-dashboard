AWSTemplateFormatVersion: "2010-09-09"
Description: >
    AppLens Customer Scanning Role.
    Deploys a cross-account IAM Role that allows AppLens to assume into this
    account, run AWS Inspector2 scans, and export SBOMs directly to the
    central AppLens S3 bucket.

# ──────────────────────────────────────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────────────────────────────────────
Parameters:
    AppLensAccountId:
        Type: String
        Description: >
            The 12-digit AWS account ID of the AppLens central environment.
            AppLens will provide this value to you.
        AllowedPattern: "^[0-9]{12}$"
        ConstraintDescription: Must be a 12-digit AWS account ID.

    AppLensS3BucketArn:
        Type: String
        Description: >
            The ARN of the central AppLens S3 bucket where SBOM exports will be
            delivered (e.g. arn:aws:s3:::applens-dev-live-inventory-us-east-2).
            AppLens will provide this value to you.
        AllowedPattern: '^arn:aws:s3:::.+$'
        ConstraintDescription: "Must be an S3 bucket ARN (e.g. arn:aws:s3:::my-bucket-name)"

    ExternalId:
        Type: String
        Description: >
            A secret token provided by AppLens during onboarding. Used to prevent
            confused-deputy attacks. AppLens will provide this value to you.
        MinLength: 8

    Environment:
        Type: String
        Description: The AppLens environment this role is registered to.
        AllowedValues:
            - dev
            - staging
            - prod
        Default: prod

# ──────────────────────────────────────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────────────────────────────────────
Resources:
    AppLensScanningRole:
        Type: AWS::IAM::Role
        Properties:
            RoleName: !Sub "AppLensScanningRole-${Environment}"
            Description: >
                Assumed by AppLens to read Inspector2 findings, export SBOMs,
                and apply automated remediation (WAF rules, security groups).

            # ── Trust Policy ────────────────────────────────────────────────────────
            # Grants AppLens's central AWS account permission to assume this role.
            # The ExternalId condition prevents confused-deputy attacks: a third-party
            # cannot trick AppLens into assuming this role on their behalf.
            AssumeRolePolicyDocument:
                Version: "2012-10-17"
                Statement:
                    - Sid: AllowAppLensAssumeRole
                      Effect: Allow
                      Principal:
                          AWS: !Sub "arn:aws:iam::${AppLensAccountId}:root"
                      Action: sts:AssumeRole
                      Condition:
                          StringEquals:
                              sts:ExternalId: !Ref ExternalId

            # ── Permissions Policy ───────────────────────────────────────────────────
            # Least-privilege: only the exact actions AppLens needs.
            Policies:
                - PolicyName: AppLensInspectorAndSbomPolicy
                  PolicyDocument:
                      Version: "2012-10-17"
                      Statement:
                          # Read Inspector2 findings, manage SBOM exports, and
                          # enable/disable Inspector2 scanning in any region.
                          # AppLens auto-enables Inspector2 in regions where it
                          # discovers resources so the customer does not have to
                          # do this manually per-region.
                          - Sid: InspectorReadAndManage
                            Effect: Allow
                            Action:
                                - inspector2:ListFindings
                                - inspector2:CreateSbomExport
                                - inspector2:GetSbomExport
                                - inspector2:Enable
                                - inspector2:Disable
                                - inspector2:BatchGetAccountStatus
                                - inspector2:ListCoverage
                            Resource: "*"
                            # Inspector2 actions do not support resource-level restrictions.

                          # Discover which regions have resources so AppLens can
                          # enable Inspector2 only where it is needed.
                          - Sid: DiscoverRegionalResources
                            Effect: Allow
                            Action:
                                - ec2:DescribeRegions
                                - ec2:DescribeInstances
                                - lambda:ListFunctions
                                - ecr:DescribeRepositories
                            Resource: "*"

                          # Write SBOM exports to the AppLens bucket under the sbom/ prefix
                          - Sid: S3PutSbomObjects
                            Effect: Allow
                            Action:
                                - s3:PutObject
                            Resource:
                                # Scoped to: sbom/<env>/<this-account-id>/<region>/*
                                # This prevents one customer's role from writing to another
                                # customer's prefix. The wildcard covers all regions.
                                - !Sub "${AppLensS3BucketArn}/sbom/${Environment}/${AWS::AccountId}/*"

                          # Manage WAF Web ACLs for automated remediation (Step 3)
                          - Sid: WafRemediation
                            Effect: Allow
                            Action:
                                - wafv2:GetWebACL
                                - wafv2:ListWebACLs
                                - wafv2:CreateWebACL
                                - wafv2:UpdateWebACL
                                - wafv2:GetRuleGroup
                                - wafv2:ListRuleGroups
                                - wafv2:CreateRuleGroup
                                - wafv2:UpdateRuleGroup
                            Resource: "*"
                            # WAFv2 actions support resource-level restrictions
                            # but are left broad here since AppLens needs to
                            # discover and modify any Web ACL in the account.

                          # Modify security groups for automated remediation (Step 3)
                          - Sid: SecurityGroupRemediation
                            Effect: Allow
                            Action:
                                - ec2:DescribeSecurityGroups
                                - ec2:AuthorizeSecurityGroupIngress
                                - ec2:RevokeSecurityGroupIngress
                                - ec2:AuthorizeSecurityGroupEgress
                                - ec2:RevokeSecurityGroupEgress
                            Resource: "*"
                            # Scoped to all security groups since AppLens needs
                            # to remediate any SG flagged by the analysis.

            Tags:
                - Key: ManagedBy
                  Value: AppLens
                - Key: Environment
                  Value: !Ref Environment

# ──────────────────────────────────────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────────────────────────────────────
Outputs:
    RoleArn:
        Description: >
            The ARN of the AppLens Scanning Role. Copy this value and paste it
            into the AppLens UI to complete the permission handshake.
        Value: !GetAtt AppLensScanningRole.Arn
        Export:
            Name: !Sub "AppLensScanningRoleArn-${Environment}"

    RoleName:
        Description: The name of the created IAM Role.
        Value: !Ref AppLensScanningRole
